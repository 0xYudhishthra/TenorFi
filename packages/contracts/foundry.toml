[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc = "0.8.30"
optimizer = true
optimizer_runs = 200
via_ir = true
# Cancun gives us EIP-1153 transient storage (the SwapVM reentrancy lock). Ethereum Sepolia
# supports it (post-Dencun).
evm_version = "cancun"
fs_permissions = [{ access = "read-write", path = "./" }]
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@1inch/swap-vm/=node_modules/@1inch/swap-vm/",
    "@1inch/aqua/=node_modules/@1inch/aqua/",
    "@1inch/solidity-utils/=node_modules/@1inch/solidity-utils/",
    "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/",
]

[fmt]
line_length = 100
