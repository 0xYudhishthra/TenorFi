[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc = "0.8.30"
optimizer = true
optimizer_runs = 200
# Cancun gives us EIP-1153 transient storage (SwapVM reentrancy lock).
# NOTE: verify Arc supports EIP-1153 before deploying the Aqua app there.
evm_version = "cancun"
remappings = ["forge-std/=lib/forge-std/src/"]

[fmt]
line_length = 100
